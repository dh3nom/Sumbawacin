<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dracin Stream Aggregator</title>
    <!-- Tailwind CSS untuk Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Custom scrollbar untuk tampilan yang lebih rapi */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 font-sans min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="glass-panel border-b border-slate-700 sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-2 text-rose-500 font-bold text-2xl tracking-tighter cursor-pointer" onclick="goHome()">
                <i class="fa-solid fa-play"></i>
                <span>Dracin<span class="text-white">Hub</span></span>
            </div>
            
            <div class="flex w-full md:w-auto items-center gap-2">
                <select id="sourceSelect" class="bg-slate-800 border border-slate-600 text-sm rounded-lg focus:ring-rose-500 focus:border-rose-500 block p-2.5 outline-none">
                    <option value="dramabox">DramaBox</option>
                    <option value="reelshort">ReelShort</option>
                    <option value="shortmax">ShortMax</option>
                    <option value="netshort">NetShort</option>
                    <option value="goodshort">GoodShort</option>
                    <option value="melolo">Melolo</option>
                    <option value="moboreels">MoboReels</option>
                </select>
                <div class="relative w-full md:w-64">
                    <input type="text" id="searchInput" placeholder="Cari drama..." class="bg-slate-800 border border-slate-600 text-sm rounded-lg focus:ring-rose-500 focus:border-rose-500 block w-full pl-10 p-2.5 outline-none" onkeypress="handleSearch(event)">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                        <i class="fa-solid fa-search text-slate-400"></i>
                    </div>
                </div>
                <button onclick="executeSearch()" class="bg-rose-600 hover:bg-rose-700 text-white px-4 py-2 rounded-lg text-sm transition font-medium">Cari</button>
            </div>
        </div>
    </nav>

    <!-- Notifikasi/Alert Area -->
    <div id="alertArea" class="container mx-auto px-4 mt-4 hidden">
        <div class="p-4 mb-4 text-sm text-yellow-800 rounded-lg bg-yellow-50 dark:bg-slate-800 dark:text-yellow-300 border border-yellow-800" role="alert">
            <span class="font-medium" id="alertMessage">Pesan error di sini.</span>
        </div>
    </div>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-6 flex-grow flex flex-col">
        
        <!-- View: Daftar Drama (Trending / Search) -->
        <div id="listView" class="w-full">
            <div class="flex justify-between items-end mb-6">
                <h2 id="listTitle" class="text-2xl font-bold border-l-4 border-rose-500 pl-3">Trending Saat Ini</h2>
                <button onclick="loadTrending()" class="text-sm text-rose-400 hover:text-rose-300"><i class="fa-solid fa-rotate-right mr-1"></i>Refresh</button>
            </div>
            
            <div id="loadingIndicator" class="hidden flex justify-center items-center py-12">
                <i class="fa-solid fa-spinner fa-spin text-4xl text-rose-500"></i>
            </div>

            <!-- Grid Konten -->
            <div id="dramaGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
                <!-- Item Card Injected via JS -->
            </div>
        </div>

        <!-- View: Player & Detail Episode -->
        <div id="playerView" class="w-full hidden flex-col gap-6">
            <button onclick="goHome()" class="self-start text-slate-400 hover:text-white transition flex items-center gap-2">
                <i class="fa-solid fa-arrow-left"></i> Kembali ke Daftar
            </button>

            <div class="flex flex-col lg:flex-row gap-6">
                <!-- Kolom Kiri: Video Player -->
                <div class="w-full lg:w-3/4 flex flex-col gap-4">
                    <div class="aspect-video bg-black rounded-xl overflow-hidden shadow-2xl relative border border-slate-700 flex justify-center items-center">
                        <div id="videoLoading" class="absolute hidden flex-col items-center gap-2 z-10">
                            <i class="fa-solid fa-circle-notch fa-spin text-3xl text-rose-500"></i>
                            <span class="text-sm text-slate-300">Mengekstrak URL...</span>
                        </div>
                        <video id="mainPlayer" controls class="w-full h-full object-contain hidden" autoplay>
                            <source src="" type="video/mp4">
                            Browser Anda tidak mendukung HTML5 video.
                        </video>
                        <div id="playerPlaceholder" class="text-slate-500 flex flex-col items-center gap-2">
                            <i class="fa-solid fa-film text-5xl"></i>
                            <span>Pilih episode untuk mulai menonton</span>
                        </div>
                    </div>
                    
                    <div>
                        <h1 id="playerDramaTitle" class="text-2xl font-bold text-white mb-1">Judul Drama</h1>
                        <p id="playerEpisodeInfo" class="text-slate-400 text-sm">Pilih episode dari daftar di samping.</p>
                    </div>
                </div>

                <!-- Kolom Kanan: Daftar Episode -->
                <div class="w-full lg:w-1/4 bg-slate-800 rounded-xl p-4 border border-slate-700 h-[600px] flex flex-col">
                    <h3 class="font-bold text-lg mb-3 flex items-center justify-between border-b border-slate-700 pb-2">
                        Daftar Episode
                        <span id="totalEpsBadge" class="bg-rose-600 text-xs px-2 py-1 rounded-full">0 Eps</span>
                    </h3>
                    
                    <!-- Scrollable Episode Grid -->
                    <div class="overflow-y-auto flex-grow pr-2" id="episodeContainer">
                        <div id="episodeGrid" class="grid grid-cols-4 gap-2">
                            <!-- Buttons Injected via JS -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="border-t border-slate-800 py-6 text-center text-slate-500 text-sm mt-auto">
        <p>&copy; 2026 DracinHub. Powered by Anichin API. All rights reserved.</p>
    </footer>

    <!-- Logic JavaScript -->
    <script>
        // --- Konfigurasi API Production ---
        const BASE_URL = "https://api.anichin.bio";
        const API_KEY = "TRIAL-ANICHIN-2026";
        
        // PENTING: Jika setelah dipasang di domain Anda web mengalami blank/error CORS,
        // Isi variabel di bawah ini dengan layanan Proxy CORS publik.
        // Contoh: const CORS_PROXY = "https://corsproxy.io/?url=";
        const CORS_PROXY = ""; 
        
        // --- State Application ---
        let currentSource = 'dramabox';
        let currentDramaId = null;
        let currentDramaTitle = '';

        // --- DOM Elements ---
        const els = {
            sourceSelect: document.getElementById('sourceSelect'),
            searchInput: document.getElementById('searchInput'),
            listView: document.getElementById('listView'),
            playerView: document.getElementById('playerView'),
            dramaGrid: document.getElementById('dramaGrid'),
            listTitle: document.getElementById('listTitle'),
            loadingIndicator: document.getElementById('loadingIndicator'),
            alertArea: document.getElementById('alertArea'),
            alertMessage: document.getElementById('alertMessage'),
            
            // Player elements
            mainPlayer: document.getElementById('mainPlayer'),
            playerPlaceholder: document.getElementById('playerPlaceholder'),
            videoLoading: document.getElementById('videoLoading'),
            playerDramaTitle: document.getElementById('playerDramaTitle'),
            playerEpisodeInfo: document.getElementById('playerEpisodeInfo'),
            episodeGrid: document.getElementById('episodeGrid'),
            totalEpsBadge: document.getElementById('totalEpsBadge')
        };

        // --- Event Listeners ---
        els.sourceSelect.addEventListener('change', (e) => {
            currentSource = e.target.value;
            loadTrending();
        });

        function handleSearch(e) {
            if (e.key === 'Enter') executeSearch();
        }

        // --- Core Fetch Function ---
        async function fetchAPI(endpoint, params = {}) {
            // Merakit URL Target
            let targetUrl = `${BASE_URL}/${currentSource}/${endpoint}`;
            const urlObj = new URL(targetUrl);
            Object.keys(params).forEach(key => urlObj.searchParams.append(key, params[key]));
            
            // Terapkan Proxy jika diaktifkan (untuk mengatasi masalah CORS di Production)
            const finalUrl = CORS_PROXY ? `${CORS_PROXY}${encodeURIComponent(urlObj.toString())}` : urlObj.toString();
            
            try {
                const response = await fetch(finalUrl, {
                    method: 'GET',
                    headers: {
                        'X-API-Key': API_KEY,
                        'Accept': 'application/json'
                    }
                });
                
                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error("API Fetch Error:", error);
                showAlert(`Koneksi Gagal: ${error.message}. Pastikan API aktif atau gunakan CORS Proxy.`);
                return null;
            }
        }

        // --- UI Functions ---
        function showAlert(msg) {
            els.alertMessage.innerText = msg;
            els.alertArea.classList.remove('hidden');
            setTimeout(() => els.alertArea.classList.add('hidden'), 5000); // Hilang dalam 5 detik
        }

        function showLoading(show) {
            els.loadingIndicator.classList.toggle('hidden', !show);
            if(show) els.dramaGrid.innerHTML = '';
        }

        function goHome() {
            els.playerView.classList.add('hidden');
            els.listView.classList.remove('hidden');
            els.mainPlayer.pause();
        }

        // --- Fitur 1: Load Trending / Search ---
        async function loadTrending() {
            goHome();
            els.listTitle.innerText = `Trending di ${currentSource.charAt(0).toUpperCase() + currentSource.slice(1)}`;
            showLoading(true);
            
            // Production: Hanya mengandalkan data asli dari API
            const data = await fetchAPI('trending'); 
            
            if (data && data.items) {
                renderGrid(data.items);
            } else {
                renderGrid([]); // Render empty state
            }
            showLoading(false);
        }

        async function executeSearch() {
            const query = els.searchInput.value.trim();
            if (!query) return;
            
            goHome();
            els.listTitle.innerText = `Hasil pencarian: "${query}"`;
            showLoading(true);

            // Production: Hanya mengandalkan data asli dari API
            const data = await fetchAPI('search', { query });
            
            if (data && data.items) {
                renderGrid(data.items);
            } else {
                renderGrid([]); // Render empty state
            }
            showLoading(false);
        }

        function renderGrid(items) {
            els.dramaGrid.innerHTML = '';
            if (!items || items.length === 0) {
                els.dramaGrid.innerHTML = `
                    <div class="col-span-full flex flex-col items-center justify-center py-16 text-slate-500">
                        <i class="fa-solid fa-folder-open text-4xl mb-3 text-slate-600"></i>
                        <p>Tidak ada data ditemukan atau gagal mengambil dari server.</p>
                    </div>`;
                return;
            }

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-slate-800 border border-slate-700 rounded-lg overflow-hidden hover:scale-105 transition duration-300 cursor-pointer group relative shadow-lg";
                // Fallback gambar hitam elegan jika API tidak mengembalikan thumbnail
                const thumb = item.thumbnail || `https://placehold.co/300x400/0f172a/334155?text=No+Poster`;
                const eps = item.episodes || '?';
                
                card.innerHTML = `
                    <div class="relative aspect-[3/4]">
                        <img src="${thumb}" alt="${item.title}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/300x400/0f172a/334155?text=Error'">
                        <div class="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-60 transition-all flex items-center justify-center">
                            <i class="fa-solid fa-play text-rose-500 opacity-0 group-hover:opacity-100 text-5xl drop-shadow-[0_0_15px_rgba(244,63,94,0.8)] scale-75 group-hover:scale-100 transition-all duration-300"></i>
                        </div>
                        <span class="absolute bottom-2 right-2 bg-black bg-opacity-80 text-xs px-2 py-1 rounded text-white border border-slate-600 shadow-md backdrop-blur-sm">${eps} Eps</span>
                    </div>
                    <div class="p-3">
                        <h3 class="font-semibold text-sm truncate text-white" title="${item.title}">${item.title}</h3>
                        <p class="text-xs text-slate-400 mt-1 font-mono">ID: ${item.id}</p>
                    </div>
                `;
                card.onclick = () => openPlayer(item.id, item.title, item.episodes);
                els.dramaGrid.appendChild(card);
            });
        }

        // --- Fitur 2: Player & Ekstraksi ---
        function openPlayer(id, title, totalEps) {
            currentDramaId = id;
            currentDramaTitle = title;
            
            els.listView.classList.add('hidden');
            els.playerView.classList.remove('hidden');
            els.playerView.classList.add('flex');
            
            els.playerDramaTitle.innerText = title;
            els.totalEpsBadge.innerText = `${totalEps || 0} Eps`;
            
            // Reset player area
            els.mainPlayer.classList.add('hidden');
            els.mainPlayer.pause();
            els.playerPlaceholder.classList.remove('hidden');
            els.playerEpisodeInfo.innerText = "Pilih episode dari daftar di samping untuk memulai streaming.";
            
            // Render tombol episode
            els.episodeGrid.innerHTML = '';
            const maxEps = totalEps || 100; // Asumsi max 100 jika API tidak menyebutkan
            for (let i = 1; i <= maxEps; i++) {
                const btn = document.createElement('button');
                btn.className = "bg-slate-700 hover:bg-rose-600 text-white font-medium py-2 rounded text-sm transition focus:ring-2 focus:ring-rose-400 ep-btn shadow-sm";
                btn.innerText = i;
                btn.id = `btn-ep-${i}`;
                btn.onclick = () => playEpisode(i, btn);
                els.episodeGrid.appendChild(btn);
            }
        }

        async function playEpisode(epNumber, btnElement) {
            // Update UI Button Active State
            document.querySelectorAll('.ep-btn').forEach(b => {
                b.classList.remove('bg-rose-600', 'ring-2', 'ring-rose-400');
                b.classList.add('bg-slate-700');
            });
            btnElement.classList.remove('bg-slate-700');
            btnElement.classList.add('bg-rose-600', 'ring-2', 'ring-rose-400');

            // Persiapan Area Video
            els.playerPlaceholder.classList.add('hidden');
            els.mainPlayer.classList.add('hidden');
            els.mainPlayer.pause();
            els.videoLoading.classList.remove('hidden');
            els.videoLoading.classList.add('flex');
            els.playerEpisodeInfo.innerHTML = `Mengontak server Anichin untuk mengekstrak URL Episode ${epNumber}... <i class="fa-solid fa-satellite-dish ml-1 text-rose-400 animate-pulse"></i>`;

            // Ekstrak URL API Production
            const data = await fetchAPI('episode', { id: currentDramaId, ep: epNumber });
            
            els.videoLoading.classList.add('hidden');
            els.videoLoading.classList.remove('flex');

            // Handle Response API
            if (!data) {
                els.playerPlaceholder.classList.remove('hidden');
                els.playerEpisodeInfo.innerText = `Gagal terhubung ke server untuk episode ${epNumber}.`;
                return;
            }

            if (data.locked) {
                showAlert(`Episode ${epNumber} bersifat Premium/VIP. API tidak dapat mengekstrak video ini.`);
                els.playerPlaceholder.classList.remove('hidden');
                els.playerEpisodeInfo.innerHTML = `<span class="text-rose-500"><i class="fa-solid fa-lock mr-1"></i> Episode ${epNumber} Terkunci (VIP)</span>`;
                return;
            }

            const videoUrl = data.videoUrl;

            if (videoUrl) {
                els.mainPlayer.src = videoUrl;
                els.mainPlayer.classList.remove('hidden');
                
                // Coba putar otomatis, tangkap error jika browser memblokir autoplay dengan suara
                els.mainPlayer.play().catch(e => {
                    console.log("Autoplay dicegah oleh kebijakan browser", e);
                });
                
                els.playerEpisodeInfo.innerHTML = `Sedang memutar: <b class="text-white">Episode ${epNumber}</b> <span class="text-xs ml-2 text-green-400"><i class="fa-solid fa-check-circle mr-1"></i>URL Diekstrak</span>`;
            } else {
                showAlert(`Data dikembalikan server, namun Payload URL Video untuk Episode ${epNumber} kosong.`);
                els.playerPlaceholder.classList.remove('hidden');
                els.playerEpisodeInfo.innerText = `Menunggu pilihan episode.`;
            }
        }

        // Init Load saat halaman pertama kali dibuka
        window.onload = loadTrending;

    </script>
</body>
</html>
