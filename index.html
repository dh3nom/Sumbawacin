<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- BYPASS HOTLINK PROTECTION: Menyembunyikan origin saat request gambar ke CDN luar agar Thumbnail muncul -->
    <meta name="referrer" content="no-referrer">
    
    <title>DracinHub | Nonton Drama Pendek Premium</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- HLS.js untuk decode stream video .m3u8 (Mengatasi Video Layar Hitam 0:00) -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #e2e8f0; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #e11d48; border-radius: 10px; }
        .glass-header { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid #334155; }
        .card-hover:hover .play-overlay { opacity: 1; transform: scale(1); }
        .play-overlay { opacity: 0; transform: scale(0.8); transition: all 0.3s ease; }
        
        .loader { border-top-color: #e11d48; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col overflow-x-hidden">

    <!-- ================= MODALS & OVERLAYS ================= -->
    <div id="toastAlert" class="fixed top-5 left-1/2 transform -translate-x-1/2 z-[100] transition-all duration-300 translate-y-[-150%] opacity-0 bg-slate-800 border border-slate-600 text-white px-6 py-3 rounded-lg shadow-2xl flex items-center gap-3 pointer-events-none">
        <i id="toastIcon" class="fa-solid fa-circle-info text-blue-400"></i>
        <span id="toastMessage">Message here</span>
    </div>

    <div id="vipModal" class="fixed inset-0 z-[80] bg-black/80 backdrop-blur-sm hidden flex items-center justify-center p-4">
        <div class="bg-slate-800 border border-slate-700 rounded-2xl w-full max-w-md p-6 relative shadow-2xl">
            <button onclick="closeModal('vipModal')" class="absolute top-4 right-4 text-slate-400 hover:text-white"><i class="fa-solid fa-times text-xl"></i></button>
            <div class="text-center mb-6">
                <i class="fa-solid fa-crown text-5xl text-yellow-500 mb-3 drop-shadow-[0_0_15px_rgba(234,179,8,0.5)]"></i>
                <h2 class="text-2xl font-bold text-white">Akses VIP Dibutuhkan</h2>
                <p class="text-slate-400 text-sm mt-2">Episode ini terkunci. Tukarkan token VIP Anda untuk memutar episode ini.</p>
            </div>
            <input type="text" id="voucherInput" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-center text-white font-mono tracking-[0.2em] uppercase outline-none mb-4" placeholder="KODE TOKEN">
            <button onclick="redeemToken()" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-bold py-3 rounded-lg transition-colors">Aktifkan Akses</button>
            <p class="text-xs text-center text-slate-500 mt-4">Static bypass token: <b class="text-yellow-500">12345</b></p>
        </div>
    </div>

    <!-- ================= AUTH VIEW ================= -->
    <div id="view-auth" class="min-h-screen flex items-center justify-center bg-slate-900 relative">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?q=80&w=2069&auto=format&fit=crop')] bg-cover bg-center opacity-20"></div>
        <div class="z-10 bg-slate-800 border border-slate-700 p-8 rounded-2xl shadow-2xl w-full max-w-sm">
            <div class="text-center mb-8">
                <div class="inline-block bg-rose-600 p-3 rounded-full mb-3">
                    <i class="fa-solid fa-play text-white text-2xl ml-1"></i>
                </div>
                <h1 class="text-3xl font-bold text-white tracking-tight">Dracin<span class="text-rose-500">Hub</span></h1>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-semibold text-slate-400 uppercase">Username</label>
                    <input type="text" id="authUsername" class="w-full mt-1 bg-slate-900 border border-slate-700 rounded-lg p-3 text-white outline-none" placeholder="Username">
                </div>
                <div>
                    <label class="text-xs font-semibold text-slate-400 uppercase">Password</label>
                    <input type="password" id="authPassword" class="w-full mt-1 bg-slate-900 border border-slate-700 rounded-lg p-3 text-white outline-none" placeholder="••••••••">
                </div>
                <div class="flex gap-3 pt-2">
                    <button onclick="handleAuth('login')" class="flex-1 bg-rose-600 hover:bg-rose-700 text-white font-semibold py-3 rounded-lg transition">Masuk</button>
                    <button onclick="handleAuth('register')" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-semibold py-3 rounded-lg border border-slate-600 transition">Daftar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= APP WRAPPER ================= -->
    <div id="view-app" class="hidden flex-col min-h-screen">
        
        <!-- NAVBAR -->
        <nav class="glass-header sticky top-0 z-50">
            <div class="container mx-auto px-4 py-3 flex flex-col md:flex-row items-center justify-between gap-4">
                <div class="flex items-center gap-2 cursor-pointer" onclick="switchView('dashboard')">
                    <i class="fa-solid fa-play text-rose-600 text-2xl"></i>
                    <span class="text-xl font-bold text-white">Dracin<span class="text-rose-500">Hub</span></span>
                </div>
                
                <div class="flex w-full md:w-auto items-center gap-2" id="navControls">
                    <select id="sourceFilter" onchange="loadData()" class="bg-slate-800 border border-slate-600 text-sm rounded-lg p-2.5 outline-none text-white">
                        <option value="dramabox">DramaBox</option>
                        <option value="reelshort">ReelShort</option>
                        <option value="shortmax">ShortMax</option>
                        <option value="goodshort">GoodShort</option>
                        <option value="moboreels">MoboReels</option>
                    </select>
                    <div class="relative flex-grow md:w-64">
                        <input type="text" id="searchInput" placeholder="Cari drama..." class="bg-slate-800 border border-slate-600 text-sm rounded-lg w-full pl-10 p-2.5 outline-none text-white" onkeydown="if(event.key === 'Enter') searchData()">
                        <i class="fa-solid fa-search text-slate-400 absolute left-3 top-3"></i>
                    </div>
                </div>

                <div class="flex items-center gap-4 border-l border-slate-700 pl-4">
                    <div class="text-right hidden sm:block">
                        <div id="uiUsername" class="text-sm font-bold text-white">User</div>
                        <div id="uiStatus" class="text-xs font-semibold text-rose-500">Standard</div>
                    </div>
                    <button onclick="openModal('vipModal')" class="bg-yellow-500/10 border border-yellow-500/50 hover:bg-yellow-500/20 text-yellow-500 w-9 h-9 rounded-full transition" title="Topup VIP"><i class="fa-solid fa-gem"></i></button>
                    <button id="navAdminBtn" onclick="switchView('admin')" class="hidden bg-purple-600/20 border border-purple-500 hover:bg-purple-600/40 text-purple-400 w-9 h-9 rounded-full transition" title="Admin Panel"><i class="fa-solid fa-hammer"></i></button>
                    <button onclick="logout()" class="text-slate-400 hover:text-white w-9 h-9 rounded-full transition"><i class="fa-solid fa-right-from-bracket"></i></button>
                </div>
            </div>
        </nav>

        <!-- MAIN CONTENT -->
        <main class="container mx-auto px-4 py-8 flex-grow">
            
            <!-- DASHBOARD -->
            <div id="view-dashboard" class="w-full">
                <div class="flex items-center justify-between mb-6">
                    <h2 id="gridTitle" class="text-2xl font-bold text-white border-l-4 border-rose-600 pl-3">Trending Hari Ini</h2>
                    <button onclick="loadData()" class="text-slate-400 hover:text-white text-sm"><i class="fa-solid fa-rotate-right mr-1"></i>Refresh</button>
                </div>
                
                <div id="loader" class="hidden flex flex-col items-center py-20">
                    <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-700 h-12 w-12 mb-4"></div>
                    <p class="text-slate-400 text-sm">Mengambil data...</p>
                </div>

                <div id="movieGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
            </div>

            <!-- PLAYER -->
            <div id="view-player" class="w-full hidden flex-col gap-6">
                <button onclick="switchView('dashboard')" class="self-start text-slate-400 hover:text-white transition flex items-center gap-2 bg-slate-800 px-4 py-2 rounded-lg border border-slate-700">
                    <i class="fa-solid fa-arrow-left"></i> Kembali
                </button>

                <div class="flex flex-col lg:flex-row gap-6">
                    <div class="w-full lg:w-3/4 flex flex-col gap-4">
                        <div class="aspect-video bg-black rounded-xl overflow-hidden shadow-2xl border border-slate-700 relative flex items-center justify-center">
                            
                            <!-- Video Player -->
                            <video id="videoPlayer" class="w-full h-full object-contain hidden" controls playsinline></video>

                            <!-- Placeholder/Loading -->
                            <div id="playerState" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900/80 z-10">
                                <i id="psIcon" class="fa-solid fa-film text-5xl text-slate-600 mb-3"></i>
                                <span id="psText" class="text-slate-400 text-sm">Pilih episode</span>
                            </div>
                        </div>
                        
                        <div>
                            <h1 id="playerTitle" class="text-2xl font-bold text-white mb-1">Judul</h1>
                            <p id="playerSubtitle" class="text-slate-400 text-sm"></p>
                        </div>
                    </div>

                    <div class="w-full lg:w-1/4 bg-slate-800 rounded-xl p-4 border border-slate-700 h-[300px] lg:h-[600px] flex flex-col shadow-xl">
                        <div class="flex items-center justify-between mb-4 border-b border-slate-700 pb-3">
                            <h3 class="font-bold text-white text-lg">Episode</h3>
                        </div>
                        <div class="overflow-y-auto flex-grow pr-1">
                            <div id="epsGrid" class="grid grid-cols-4 sm:grid-cols-6 lg:grid-cols-4 gap-2"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ADMIN PANEL -->
            <div id="view-admin" class="w-full hidden flex-col gap-6">
                <div class="flex items-center justify-between border-b border-slate-700 pb-4">
                    <h2 class="text-2xl font-bold text-white"><i class="fa-solid fa-shield-halved text-purple-500 mr-2"></i>Admin Panel</h2>
                    <button onclick="switchView('dashboard')" class="bg-slate-800 hover:bg-slate-700 border border-slate-600 text-white px-4 py-2 rounded-lg text-sm"><i class="fa-solid fa-arrow-left mr-2"></i>Tutup</button>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="bg-slate-800 p-5 rounded-xl border border-slate-700 h-fit">
                        <h3 class="font-bold text-white mb-4 border-b border-slate-700 pb-2">Generate Token</h3>
                        <div class="space-y-3">
                            <input type="text" id="admTokenCode" class="w-full bg-slate-900 border border-slate-600 rounded p-2 text-white uppercase font-mono" placeholder="KODE TOKEN">
                            <input type="number" id="admTokenDays" class="w-full bg-slate-900 border border-slate-600 rounded p-2 text-white" value="30" placeholder="Durasi (Hari)">
                            <button onclick="generateToken()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 rounded mt-2">Buat Token</button>
                        </div>
                    </div>

                    <div class="lg:col-span-2 bg-slate-800 p-5 rounded-xl border border-slate-700 h-[500px] flex flex-col">
                        <div class="flex gap-4 border-b border-slate-700 mb-4">
                            <button onclick="switchAdminTab('users')" id="tabUsers" class="pb-2 text-purple-400 border-b-2 border-purple-400 font-semibold">Pengguna</button>
                            <button onclick="switchAdminTab('tokens')" id="tabTokens" class="pb-2 text-slate-400 border-b-2 border-transparent hover:text-white">Token</button>
                        </div>
                        <div id="adminTabUsers" class="overflow-y-auto flex-grow"><table class="w-full text-left text-sm whitespace-nowrap"><tbody id="admUserList" class="divide-y divide-slate-700"></tbody></table></div>
                        <div id="adminTabTokens" class="overflow-y-auto flex-grow hidden"><table class="w-full text-left text-sm whitespace-nowrap"><tbody id="admTokenList" class="divide-y divide-slate-700"></tbody></table></div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- ================= LOGIC ================= -->
    <script>
        // Konfigurasi Database Lokal (Browser Storage)
        const DB_USERS = "dracin_users";
        const DB_TOKENS = "dracin_tokens";
        const DB_SESSION = "dracin_session";

        // Konfigurasi Kredensial Admin & Token Statis
        const ADMIN_USER = "JonperiksaJon";
        const ADMIN_PASS = "Lordgemini22";
        const STATIC_TOKEN = "12345";

        // Konfigurasi API Anichin
        const API_BASE = "https://api.anichin.bio";
        const API_KEY = "TRIAL-ANICHIN-2026";
        
        // CORS Proxy: Memastikan request dari Github Pages / browser tidak diblokir oleh server Anichin
        // Jika API Error, Anda bisa mencoba proxy alternatif seperti: "https://api.allorigins.win/raw?url="
        const CORS_PROXY = "https://corsproxy.io/?url=";

        let activeUser = null;
        let apiSource = 'dramabox';
        let playerContext = {};
        let hlsInstance = null; // Menyimpan instance HLS.js untuk memutar video .m3u8

        // Helper Database Lokal
        const getDB = (k) => JSON.parse(localStorage.getItem(k)) || {};
        const setDB = (k, v) => localStorage.setItem(k, JSON.stringify(v));

        function showToast(msg, type = 'info') {
            const t = document.getElementById('toastAlert');
            document.getElementById('toastMessage').innerText = msg;
            document.getElementById('toastIcon').className = type === 'error' ? 'fa-solid fa-exclamation-triangle text-rose-500' : 'fa-solid fa-check-circle text-green-400';
            t.style.opacity = '1'; t.style.transform = 'translate(-50%, 20px)';
            setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, -150%)'; }, 3000);
        }

        // Inisialisasi Akun Admin dan Token 12345 secara otomatis
        function initSystemDB() {
            let u = getDB(DB_USERS), t = getDB(DB_TOKENS);
            if (!u[ADMIN_USER]) u[ADMIN_USER] = { password: ADMIN_PASS, role: 'admin', vipUntil: 4102444800000 };
            if (!t[STATIC_TOKEN]) t[STATIC_TOKEN] = { duration: 30, used: false, isStatic: true };
            setDB(DB_USERS, u); setDB(DB_TOKENS, t);
        }

        function handleAuth(action) {
            const usr = document.getElementById('authUsername').value.trim();
            const pwd = document.getElementById('authPassword').value;
            if(!usr || !pwd) return showToast("Form tidak lengkap", "error");

            let u = getDB(DB_USERS);
            if (action === 'register') {
                if(u[usr]) return showToast("Username terpakai", "error");
                u[usr] = { password: pwd, role: 'user', vipUntil: 0 };
                setDB(DB_USERS, u); showToast("Registrasi sukses", "success");
            } else {
                if(!u[usr] || u[usr].password !== pwd) return showToast("Kredensial invalid", "error");
                activeUser = { username: usr, ...u[usr] };
                setDB(DB_SESSION, activeUser);
                refreshAppUI();
            }
        }

        function logout() {
            localStorage.removeItem(DB_SESSION); activeUser = null;
            if(hlsInstance) hlsInstance.destroy();
            refreshAppUI();
        }

        function isVIP() {
            return activeUser && (activeUser.role === 'admin' || activeUser.vipUntil > Date.now());
        }

        function switchView(v) {
            ['auth','app','dashboard','player','admin'].forEach(x => document.getElementById(`view-${x}`)?.classList.add('hidden'));
            if(v === 'auth') document.getElementById('view-auth').classList.remove('hidden');
            else {
                document.getElementById('view-app').classList.remove('hidden');
                document.getElementById('view-app').classList.add('flex');
                document.getElementById(`view-${v}`).classList.remove('hidden');
                
                if(v === 'dashboard') document.getElementById('navControls').classList.remove('hidden');
                else document.getElementById('navControls').classList.add('hidden');
                
                if(v === 'admin') renderAdminPanel();
                
                // Matikan video jika keluar dari player
                if(v !== 'player') {
                    document.getElementById('videoPlayer').pause();
                    if(hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
                }
            }
        }

        function refreshAppUI() {
            const sess = getDB(DB_SESSION);
            if (sess) {
                activeUser = sess;
                let u = getDB(DB_USERS);
                if(u[activeUser.username]) activeUser.vipUntil = u[activeUser.username].vipUntil;

                document.getElementById('uiUsername').innerText = activeUser.username;
                if (activeUser.role === 'admin') {
                    document.getElementById('uiStatus').innerText = "Admin";
                    document.getElementById('navAdminBtn').classList.remove('hidden');
                } else {
                    document.getElementById('navAdminBtn').classList.add('hidden');
                    document.getElementById('uiStatus').innerText = isVIP() ? "VIP Active" : "Standard";
                    document.getElementById('uiStatus').className = isVIP() ? "text-xs font-semibold text-yellow-400" : "text-xs font-semibold text-slate-400";
                }
                switchView('dashboard'); loadData();
            } else switchView('auth');
        }

        // Fungsi fetch utama yang memotong blokir CORS
        async function fetchAPI(endpoint, params = {}) {
            const urlObj = new URL(`${API_BASE}/${apiSource}/${endpoint}`);
            Object.keys(params).forEach(k => urlObj.searchParams.append(k, params[k]));
            try {
                // Encode URI disisipkan ke dalam Proxy
                const targetUrl = encodeURIComponent(urlObj.toString());
                const res = await fetch(`${CORS_PROXY}${targetUrl}`, { 
                    headers: { 'X-API-Key': API_KEY }
                });
                
                if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
                return await res.json();
            } catch (err) {
                console.error("Fetch API Error:", err);
                showToast("Gagal menyambung ke server/API Limit", "error");
                return null;
            }
        }

        async function loadData() {
            apiSource = document.getElementById('sourceFilter').value;
            document.getElementById('gridTitle').innerText = `Trending: ${apiSource}`;
            document.getElementById('movieGrid').innerHTML = '';
            document.getElementById('loader').classList.remove('hidden');
            
            const data = await fetchAPI('trending');
            document.getElementById('loader').classList.add('hidden');
            renderGrid(data?.items || []);
        }

        async function searchData() {
            const q = document.getElementById('searchInput').value.trim();
            if(!q) return loadData();
            apiSource = document.getElementById('sourceFilter').value;
            document.getElementById('gridTitle').innerText = `Search: ${q}`;
            document.getElementById('movieGrid').innerHTML = '';
            document.getElementById('loader').classList.remove('hidden');
            
            const data = await fetchAPI('search', { query: q });
            document.getElementById('loader').classList.add('hidden');
            renderGrid(data?.items || []);
        }

        function renderGrid(items) {
            const grid = document.getElementById('movieGrid');
            if(!items.length) return grid.innerHTML = `<div class="col-span-full text-center py-10 text-slate-500">Nihil data atau Request terlalu banyak (Rate Limit).</div>`;
            
            items.forEach(i => {
                grid.innerHTML += `
                    <div onclick="initPlayer('${i.id}', '${i.title.replace(/'/g, "\\'")}', ${i.episodes})" class="bg-slate-800 rounded-xl overflow-hidden cursor-pointer card-hover border border-slate-700">
                        <div class="relative aspect-[3/4] bg-slate-900">
                            <!-- Referrer Policy sudah diatur di tag Head (no-referrer), maka gambar harusnya muncul -->
                            <img src="${i.thumbnail || ''}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/300x400/1e293b/475569?text=No+Cover'">
                            <div class="absolute top-2 right-2 bg-slate-900/80 text-xs font-bold px-2 py-1 rounded text-yellow-400">${i.episodes} Eps</div>
                        </div>
                        <div class="p-3"><h3 class="text-sm truncate text-slate-200">${i.title}</h3></div>
                    </div>`;
            });
        }

        function initPlayer(id, title, eps) {
            playerContext = { id, title, eps: eps || 50 };
            document.getElementById('playerTitle').innerText = title;
            document.getElementById('playerSubtitle').innerText = `${apiSource} • ${playerContext.eps} Episode`;
            
            const vid = document.getElementById('videoPlayer');
            vid.pause(); vid.classList.add('hidden');
            if(hlsInstance) hlsInstance.destroy();
            
            document.getElementById('playerState').classList.remove('hidden');
            document.getElementById('psIcon').className = "fa-solid fa-film text-5xl text-slate-600 mb-3";
            document.getElementById('psText').innerText = "Pilih episode";

            const grid = document.getElementById('epsGrid');
            grid.innerHTML = '';
            for(let i=1; i<=playerContext.eps; i++) {
                grid.innerHTML += `<button onclick="playEpisode(${i}, this)" class="ep-btn bg-slate-700 hover:bg-slate-600 text-slate-200 py-2 rounded text-sm transition">${i}</button>`;
            }
            switchView('player');
        }

        async function playEpisode(ep, btn) {
            document.querySelectorAll('.ep-btn').forEach(b => b.className = "ep-btn bg-slate-700 text-slate-200 py-2 rounded text-sm");
            btn.className = "ep-btn bg-rose-600 text-white font-bold py-2 rounded text-sm";

            const vid = document.getElementById('videoPlayer');
            const ps = document.getElementById('playerState');
            vid.pause(); vid.classList.add('hidden');
            if(hlsInstance) hlsInstance.destroy(); // Bersihkan player lama
            
            ps.classList.remove('hidden');
            document.getElementById('psIcon').className = "fa-solid fa-circle-notch fa-spin text-5xl text-rose-500 mb-3";
            document.getElementById('psText').innerText = "Mengekstrak URL Video...";

            const data = await fetchAPI('episode', { id: playerContext.id, ep });
            
            if(!data) {
                document.getElementById('psIcon').className = "fa-solid fa-triangle-exclamation text-yellow-500 text-5xl mb-3";
                document.getElementById('psText').innerText = "Gagal memuat URL / Terblokir";
                return;
            }

            if(data.locked && !isVIP()) {
                document.getElementById('psIcon').className = "fa-solid fa-lock text-rose-500 text-5xl mb-3";
                document.getElementById('psText').innerText = "Episode VIP (Terkunci)";
                openModal('vipModal');
                return;
            }

            if(data.videoUrl) {
                ps.classList.add('hidden');
                vid.classList.remove('hidden');
                
                // ===== LOGIKA HLS.js UNTUK MEMUTAR .m3u8 =====
                // Jika video URL berekstensi .m3u8, gunakan HLS.js agar bisa diputar di PC/Chrome
                if (data.videoUrl.includes('.m3u8')) {
                    if (Hls.isSupported()) {
                        hlsInstance = new Hls();
                        hlsInstance.loadSource(data.videoUrl);
                        hlsInstance.attachMedia(vid);
                        hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
                            vid.play().catch(e => console.log("Autoplay dicegah oleh browser"));
                        });
                        hlsInstance.on(Hls.Events.ERROR, function (event, data) {
                            if (data.fatal) console.error("HLS Error:", data);
                        });
                    } 
                    // Fallback untuk Safari / iOS yang native support .m3u8
                    else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
                        vid.src = data.videoUrl;
                        vid.addEventListener('loadedmetadata', function() {
                            vid.play().catch(e => console.log("Autoplay dicegah oleh browser"));
                        });
                    }
                } else {
                    // MP4 Standar
                    vid.src = data.videoUrl;
                    vid.play().catch(e => console.log("Autoplay dicegah oleh browser"));
                }
            }
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        function redeemToken() {
            const code = document.getElementById('voucherInput').value.trim().toUpperCase();
            let t = getDB(DB_TOKENS);
            if(t[code]) {
                if(!t[code].isStatic && t[code].used) return showToast("Token sudah terpakai", "error");
                
                let u = getDB(DB_USERS);
                let start = activeUser.vipUntil > Date.now() ? activeUser.vipUntil : Date.now();
                u[activeUser.username].vipUntil = start + (t[code].duration * 86400000); // Konversi hari ke milidetik
                setDB(DB_USERS, u);
                
                if(!t[code].isStatic) { t[code].used = true; setDB(DB_TOKENS, t); }
                
                showToast("VIP Sukses Diaktifkan", "success");
                closeModal('vipModal'); refreshAppUI();
            } else showToast("Token invalid", "error");
        }

        // --- Admin Panel Controls ---
        function switchAdminTab(t) {
            document.getElementById('adminTabUsers').classList.toggle('hidden', t !== 'users');
            document.getElementById('adminTabTokens').classList.toggle('hidden', t !== 'tokens');
            
            document.getElementById('tabUsers').className = t === 'users' ? "pb-2 text-purple-400 border-b-2 border-purple-400 font-semibold" : "pb-2 text-slate-400 border-b-2 border-transparent hover:text-white";
            document.getElementById('tabTokens').className = t === 'tokens' ? "pb-2 text-purple-400 border-b-2 border-purple-400 font-semibold" : "pb-2 text-slate-400 border-b-2 border-transparent hover:text-white";
        }

        function renderAdminPanel() {
            const u = getDB(DB_USERS), t = getDB(DB_TOKENS);
            const tbodyU = document.getElementById('admUserList'), tbodyT = document.getElementById('admTokenList');
            
            tbodyU.innerHTML = Object.keys(u).map(k => `
                <tr class="border-b border-slate-700">
                    <td class="py-2 text-white">${k}</td>
                    <td><span class="px-2 py-1 bg-slate-700 rounded text-xs">${u[k].role}</span></td>
                    <td class="${u[k].vipUntil > Date.now() ? 'text-green-400' : 'text-slate-500'}">
                        ${u[k].vipUntil > Date.now() ? new Date(u[k].vipUntil).toLocaleDateString() : 'Non-VIP'}
                    </td>
                </tr>`).join('');
            
            tbodyT.innerHTML = Object.keys(t).map(k => `
                <tr class="border-b border-slate-700">
                    <td class="py-2 text-yellow-400 font-mono tracking-wider">${k}</td>
                    <td>${t[k].duration} Hari</td>
                    <td>
                        ${t[k].isStatic ? '<span class="text-blue-400"><i class="fa-solid fa-infinity"></i> Static</span>' : (t[k].used ? '<span class="text-rose-500">Terpakai</span>' : '<span class="text-green-400">Aktif</span>')}
                    </td>
                </tr>`).join('');
        }

        function generateToken() {
            const c = document.getElementById('admTokenCode').value.toUpperCase();
            const d = parseInt(document.getElementById('admTokenDays').value);
            
            if(!c) return showToast("Kode tidak boleh kosong", "error");
            
            let t = getDB(DB_TOKENS);
            if(!t[c]) { 
                t[c] = { duration: d, used: false, isStatic: false }; 
                setDB(DB_TOKENS, t); 
                renderAdminPanel(); 
                showToast("Token berhasil dibuat", "success"); 
                document.getElementById('admTokenCode').value = '';
            } else {
                showToast("Kode token sudah ada", "error");
            }
        }

        // Init saat halaman dimuat
        window.onload = () => { initSystemDB(); refreshAppUI(); };
    </script>
</body>
</html>
